<!DOCTYPE HTML>
<html>
    <head>
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- outer card -->
         <div class="card">

            <!-- search-bars -->
            <div class="search-bars">
                <input type="text" placeholder="Enter city name" class="search1">
                <div  class="search2">
                    <button onclick="clicked()"><img src="Images/search.png"></button>
                </div>
            </div>

            <!-- info -->
            <div class="info">

            
            <!-- weather image -->
             <div class="weather-image">
                <img src="Images/rain.png" class="weather-icon">
             </div>

             <!-- weather °c alt+0176  -->
              <div class="weather">
                <h1 class="temp"></h1>
                <h1 class="city">Madurai</h1>
              </div>

              <!--footer  -->
              <div class="footer">
                <!-- left -->
                <div class="left-footer">
                    <img src="Images/humidity.png">
                    <div>
                        <h4 class="humidity">50%</h4>
                        <h3>Humidity</h3>
                    </div>
                </div>
                <!-- left -->
                <div class="right-footer">
                    <img src="Images/wind.png">
                    <div>
                        <h4 class="wind">15 km/h</h4>
                        <h3>Windspeed</h3>
                    </div>
                </div>
              </div>

              </div>
              <!-- info ends -->
            
         </div>


         <script>
            const apiKey = "c1921fb82a95e0c659e432db3ea2591a"
            const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q="

            const searchBox = document.querySelector('.search-bars input')
            const searchBtn = document.querySelector('.search-bars button')
            const weatherIcon  = document.querySelector('.weather-icon')
            const info = document.querySelector('.info')

           async function checkWeather(city){
                const response = await fetch(apiUrl + city + `&appid=${apiKey}`)
                var data = await response.json()
                console.log(data)

                document.querySelector('.city').innerHTML = data.name 
                document.querySelector('.temp').innerHTML = Math.round(data.main.temp) + "°c" 
                document.querySelector('.humidity').innerHTML = data.main.humidity + "%"
                document.querySelector('.wind').innerHTML = data.wind.speed + " km/h"
                
                if(data.weather[0].main == "Clouds"){
                    weatherIcon.src = "Images/clouds.png"
                }
                else if(data.weather[0].main == "Clear"){
                    weatherIcon.src = "Images/clear.png"
                }
                else if(data.weather[0].main == "Drizzle"){
                    weatherIcon.src = "Images/drizzle.png"
                }
                else if(data.weather[0].main == "Humidity"){
                    weatherIcon.src = "Images/humidity.png"
                }
                else if(data.weather[0].main == "Mist"){
                    weatherIcon.src = "Images/mist.png"
                }
                else if(data.weather[0].main == "Rain"){
                    weatherIcon.src = "Images/rain.png"
                }
                else if(data.weather[0].main == "Snow"){
                    weatherIcon.src = "Images/snow.png"
                }
                else{
                    weatherIcon.src = "Images/wind.png"
                }
                info.style.display="block"
            }

            function clicked(){
                var city = searchBox.value
                checkWeather(city)
            }
            





            
         </script>
    </body>
</html>
